spring:
  application:
    name: buzzer-messenger

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:buzzer}
    username: ${DB_USERNAME:buzzer}
    password: ${DB_PASSWORD:buzzer_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:buzzer}
    password: ${RABBITMQ_PASSWORD:buzzer_dev_password}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: ${SERVER_PORT:8080}

jwt:
  access-token-ttl: 15m
  refresh-token-ttl: 30d
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:buzzer_minio}
  secret-key: ${MINIO_SECRET_KEY:buzzer_minio_password}
  buckets:
    attachments: chat-attachments
    avatars: chat-avatars
    thumbnails: chat-thumbnails

resilience4j:
  ratelimiter:
    instances:
      auth-login:
        limitForPeriod: 5
        limitRefreshPeriod: 15m
        timeoutDuration: 0
        registerHealthIndicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.buzzer: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG