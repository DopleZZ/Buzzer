databaseChangeLog:
  - changeSet:
      id: 20250330-001-1-users
      author: buzzer
      comment: Create users table
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: username
                  type: varchar(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: avatar_url
                  type: text
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: 'active'
                  constraints:
                    nullable: false
              - column:
                  name: last_seen_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_users_email
            tableName: users
            columns:
              - column:
                  name: email
        - createIndex:
            indexName: idx_users_username
            tableName: users
            columns:
              - column:
                  name: username

  - changeSet:
      id: 20250330-001-2-refresh-tokens
      author: buzzer
      comment: Create refresh_tokens table
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: token_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: device_info
                  type: text
              - column:
                  name: expires_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: revoked_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_refresh_tokens_user
            tableName: refresh_tokens
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 20250330-001-3-user-key-bundles
      author: buzzer
      comment: Create user_key_bundles table for E2E encryption
      changes:
        - createTable:
            tableName: user_key_bundles
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_key_bundles_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: identity_key_pub
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: signed_prekey_pub
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: signed_prekey_sig
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: prekey_id
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

  - changeSet:
      id: 20250330-001-4-one-time-prekeys
      author: buzzer
      comment: Create one_time_prekeys table
      changes:
        - createTable:
            tableName: one_time_prekeys
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_one_time_prekeys_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: prekey_id
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: public_key
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: used
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_one_time_prekeys_user_used
            tableName: one_time_prekeys
            columns:
              - column:
                  name: user_id
              - column:
                  name: used

  - changeSet:
      id: 20250330-001-5-e2e-sessions
      author: buzzer
      comment: Create e2e_sessions table
      changes:
        - createTable:
            tableName: e2e_sessions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: initiator_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_e2e_sessions_initiator
                    references: users(id)
              - column:
                  name: recipient_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_e2e_sessions_recipient
                    references: users(id)
              - column:
                  name: session_state
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

  - changeSet:
      id: 20250330-001-6-conversations
      author: buzzer
      comment: Create conversations table
      changes:
        - createTable:
            tableName: conversations
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: type
                  type: varchar(10)
                  defaultValue: 'direct'
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_conversations_created_by
                    references: users(id)
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: last_message_at
                  type: timestamptz
        - createIndex:
            indexName: idx_conversations_last_message
            tableName: conversations
            columns:
              - column:
                  name: last_message_at
                  descending: true

  - changeSet:
      id: 20250330-001-7-conversation-members
      author: buzzer
      comment: Create conversation_members table
      changes:
        - createTable:
            tableName: conversation_members
            columns:
              - column:
                  name: conversation_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_conversation_members_conversation
                    references: conversations(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_conversation_members_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: role
                  type: varchar(20)
                  defaultValue: 'member'
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: last_read_message_id
                  type: uuid
              - column:
                  name: muted_until
                  type: timestamptz
        - createIndex:
            indexName: idx_conversation_members_user
            tableName: conversation_members
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: 20250330-001-8-messages
      author: buzzer
      comment: Create messages table
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: conversation_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_messages_conversation
                    references: conversations(id)
                    deleteCascade: true
              - column:
                  name: sender_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_messages_sender
                    references: users(id)
              - column:
                  name: type
                  type: varchar(20)
                  defaultValue: 'text'
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: text
              - column:
                  name: iv
                  type: varchar(50)
              - column:
                  name: reply_to_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_messages_reply_to
                    references: messages(id)
                    deleteCascade: true
              - column:
                  name: is_edited
                  type: boolean
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_messages_conv_created
            tableName: messages
            columns:
              - column:
                  name: conversation_id
              - column:
                  name: created_at
                  descending: true
        - createIndex:
            indexName: idx_messages_sender
            tableName: messages
            columns:
              - column:
                  name: sender_id

  - changeSet:
      id: 20250330-001-9-message-attachments
      author: buzzer
      comment: Create message_attachments table
      changes:
        - createTable:
            tableName: message_attachments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attachments_message
                    references: messages(id)
                    deleteCascade: true
              - column:
                  name: minio_object_key
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_file_key
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: file_name_encrypted
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: mime_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: size_bytes
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: thumbnail_key
                  type: text

  - changeSet:
      id: 20250330-001-10-message-reactions
      author: buzzer
      comment: Create message_reactions table
      changes:
        - createTable:
            tableName: message_reactions
            columns:
              - column:
                  name: message_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_reactions_message
                    references: messages(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_reactions_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: emoji
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

  - changeSet:
      id: 20250330-001-11-group-settings
      author: buzzer
      comment: Create group_settings table
      changes:
        - createTable:
            tableName: group_settings
            columns:
              - column:
                  name: conversation_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_group_settings_conversation
                    references: conversations(id)
                    deleteCascade: true
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: avatar_url
                  type: text
              - column:
                  name: invite_link
                  type: varchar(100)
                  constraints:
                    unique: true
              - column:
                  name: max_members
                  type: integer
                  defaultValue: 500
              - column:
                  name: is_public
                  type: boolean
                  defaultValue: false

  - changeSet:
      id: 20250330-001-12-message-read-receipts
      author: buzzer
      comment: Create message_read_receipts table
      changes:
        - createTable:
            tableName: message_read_receipts
            columns:
              - column:
                  name: message_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_read_receipts_message
                    references: messages(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_read_receipts_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: read_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

  - changeSet:
      id: 20250330-001-13-contacts
      author: buzzer
      comment: Create contacts table
      changes:
        - createTable:
            tableName: contacts
            columns:
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_contacts_owner
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: contact_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_contacts_contact
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: 'active'
                  constraints:
                    nullable: false
              - column:
                  name: custom_name
                  type: varchar(100)
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()

  - changeSet:
      id: 20250330-001-14-user-privacy-settings
      author: buzzer
      comment: Create user_privacy_settings table
      changes:
        - createTable:
            tableName: user_privacy_settings
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_privacy_settings_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: last_seen_visibility
                  type: varchar(20)
                  defaultValue: 'contacts'
                  constraints:
                    nullable: false
              - column:
                  name: avatar_visibility
                  type: varchar(20)
                  defaultValue: 'everyone'
                  constraints:
                    nullable: false
              - column:
                  name: read_receipts_enabled
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false
              - column:
                  name: online_status_visible
                  type: boolean
                  defaultValue: true
                  constraints:
                    nullable: false

  - changeSet:
      id: 20250330-001-15-notifications
      author: buzzer
      comment: Create notifications table
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: jsonb
                  constraints:
                    nullable: false
              - column:
                  name: read_at
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
                  defaultValueComputed: now()
        - createIndex:
            indexName: idx_notifications_user_read
            tableName: notifications
            columns:
              - column:
                  name: user_id
              - column:
                  name: read_at